# ═══════════════════════════════════════════════════════
# ServiceAccount + Role + RoleBinding for backend pod
#
# The backend pod needs to:
#   - Call MySQL (network, not K8s API — no RBAC needed)
#   - Read its own ConfigMap and Secret (K8s API — needs RBAC)
#
# It does NOT need to:
#   - List all pods
#   - Read other services' secrets
#   - Create/delete anything in the cluster
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: default
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
