# ═══════════════════════════════════════════════════════
# ServiceAccount — an identity for the mysql-0 pod
#
# A ServiceAccount is NOT a human user. It's a Kubernetes
# identity assigned to a Pod so the cluster knows WHO that
# pod is when it calls the Kubernetes API.
#
# Without this: mysql-0 uses "default" ServiceAccount
# With this:    mysql-0 uses "mysql-sa" which has only
#               the specific permissions we define in the
#               Role + RoleBinding below.
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-sa
  namespace: default
