# ═══════════════════════════════════════════════════════
# Ansible Inventory — defines WHICH hosts to configure
#
# For this project we're configuring the Jenkins container
# running locally on Docker. Instead of SSH (which Ansible
# normally uses for remote servers), we use
# ansible_connection=docker which runs commands directly
# inside the container via docker exec.
#
# This is the equivalent of:
#   docker exec -it jenkins-server apt-get install kubectl
# but managed, idempotent, and version-controlled.
# ═══════════════════════════════════════════════════════

[jenkins]
jenkins-server ansible_connection=docker

[jenkins:vars]
ansible_user=root
