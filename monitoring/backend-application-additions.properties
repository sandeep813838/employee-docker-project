# ADD THESE LINES to your backend/src/main/resources/application.properties

# Expose prometheus metrics endpoint
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Tag all metrics with app name (useful in Grafana filters)
management.metrics.tags.application=employee-api

# Enable histogram for response time percentiles (P50, P95, P99)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# HikariCP DB connection pool metrics
spring.datasource.hikari.metrics-enabled=true
