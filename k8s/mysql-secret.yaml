# ═══════════════════════════════════════════════════════
# Secret — stores the MySQL root password
#
# WHY a Secret instead of a ConfigMap:
# ConfigMap = plain text config (DB_NAME, DB_PORT — fine to see)
# Secret    = base64-encoded, meant for passwords/tokens/keys
#             (base64 is NOT encryption — just encoding — but
#              Kubernetes treats Secrets differently: not shown
#              in kubectl describe by default, can be encrypted
#              at rest at the cluster level, access can be RBAC-
#              restricted separately from ConfigMaps)
#
# This directly replaces this line from docker-compose.yml:
#   environment:
#     MYSQL_ROOT_PASSWORD: password
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
stringData:
  # stringData lets you write PLAIN TEXT here —
  # Kubernetes automatically base64-encodes it for you.
  # (the alternative "data:" field requires YOU to pre-encode it)
  MYSQL_ROOT_PASSWORD: "password"
  MYSQL_PASSWORD: "apppassword"
