# ═══════════════════════════════════════════════════════
# ConfigMap — holds nginx.conf content, mounted as a file
# into the frontend pod, same pattern as mysql-init-script.
#
# This replaces the Docker build-time COPY of nginx.conf —
# instead of baking it into the image, we inject it at
# deploy time via ConfigMap. This is actually MORE flexible
# than Docker Compose's approach: you can change routing
# config without rebuilding the image at all, just update
# this ConfigMap and restart the pod.
#
# Notice the proxy_pass target: http://backend:8080 — the
# EXACT SAME hostname as your Docker nginx.conf used. Service
# name DNS resolution works identically in concept here,
# just resolved by CoreDNS instead of Docker's embedded DNS.
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://backend:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        location /actuator/ {
            proxy_pass http://backend:8080;
        }
    }
