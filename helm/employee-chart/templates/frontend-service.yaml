apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
      {{- if eq .Values.service.frontendType "NodePort" }}
      nodePort: {{ .Values.service.frontendNodePort }}
      {{- end }}
  type: {{ .Values.service.frontendType }}
  {{- if .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
