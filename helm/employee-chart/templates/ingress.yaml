{{- if .Values.ingress.enabled }}
# ── This entire file is conditional ───────────────────────
# If values.yaml has ingress.enabled: false, Helm renders
# this template as EMPTY — no Ingress object is created at all.
# This is how one chart works in both "with Ingress" and
# "without Ingress" (NodePort) environments.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
{{- end }}
